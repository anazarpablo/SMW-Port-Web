<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Mario World - Web Port</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonte Pixel para a marca d'água -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Painel de Controle Superior (Só aparece no PC) -->
    <div id="control-panel">
        <div class="panel-section">
            <span class="game-title">SMW Port</span>
        </div>

        <div class="panel-section">
            <label for="filter-select">Filtro:</label>
            <select id="filter-select" onchange="changeFilter(this.value)">
                <option value="pixelated">Retro Sharp</option>
                <option value="smooth">Smooth</option>
                <option value="crt">CRT Retro</option>
            </select>

            <label for="volume-slider">Volume:</label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)">
        </div>

        <div class="panel-section">
            <button onclick="EJS_emulator.gameManager.controls.showMapping()">🎮 Controles</button>
            <button onclick="toggleFullscreen()">📺 Tela Cheia</button>
        </div>
    </div>

    <!-- Container do Jogo -->
    <div id="game-wrapper">
        <!-- MARCA D'ÁGUA PIXEL -->
        <div id="watermark">Alcino9d2026Anazar</div>
        
        <div id="crt-overlay" class="hidden"></div>
        <div id="game"></div>
    </div>

    <!-- Script do Emulador -->
    <script>
        EJS_player = '#game';
        EJS_gameUrl = 'mario_world.sfc'; 
        EJS_core = 'snes';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_defaultVolume = 0.5;
        EJS_Background = "#000"; 
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script>
        // Mudar Filtros de Tela
        function changeFilter(filterType) {
            const canvasContainer = document.querySelector('#game canvas');
            const crtOverlay = document.getElementById('crt-overlay');
            if (!canvasContainer) return;
            canvasContainer.style.imageRendering = 'auto';
            crtOverlay.classList.add('hidden');
            if (filterType === 'pixelated') canvasContainer.style.imageRendering = 'pixelated';
            if (filterType === 'crt') {
                canvasContainer.style.imageRendering = 'pixelated';
                crtOverlay.classList.remove('hidden');
            }
        }

        // Alterar Volume
        function changeVolume(value) {
            if(window.EJS_emulator && EJS_emulator.gameManager) {
                EJS_emulator.gameManager.audio.setVolume(parseFloat(value));
            }
        }

        // Alternar Tela Cheia
        function toggleFullscreen() {
            const wrapper = document.documentElement;
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(err => alert(err.message));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
