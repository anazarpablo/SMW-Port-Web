<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game - Web Port</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="game-body">

    <div id="toast" class="hidden">Progresso Salvo!</div>

    <div id="game-wrapper">
        <div id="watermark">Desenvolvido por thebloxlelled</div>
        <div id="game"></div>
    </div>

    <!-- Controles que o emulador NÃO consegue apagar -->
    <div id="mobile-controls" class="persistent-controls">
        <div class="l-r-buttons">
            <button class="btn-trigger" data-key="q" data-code="KeyQ">L</button>
            <button class="btn-trigger" data-key="w" data-code="KeyW">R</button>
        </div>
        <div class="dpad">
            <button class="btn-dpad up" data-key="ArrowUp" data-code="ArrowUp"></button>
            <button class="btn-dpad down" data-key="ArrowDown" data-code="ArrowDown"></button>
            <button class="btn-dpad left" data-key="ArrowLeft" data-code="ArrowLeft"></button>
            <button class="btn-dpad right" data-key="ArrowRight" data-code="ArrowRight"></button>
        </div>
        <div class="menu-buttons">
            <button class="btn-menu" data-key="Shift" data-code="ShiftLeft">SELECT</button>
            <button class="btn-menu" data-key="Enter" data-code="Enter">START</button>
            <button class="btn-quick" id="btn-save">💾</button>
            <button class="btn-quick" id="btn-load">📂</button>
        </div>
        <div class="action-buttons">
            <button class="btn-action b-x" data-key="s" data-code="KeyS">X</button>
            <button class="btn-action b-a" data-key="x" data-code="KeyX">A</button>
            <button class="btn-action b-y" data-key="a" data-code="KeyA">Y</button>
            <button class="btn-action b-b" data-key="z" data-code="KeyZ">B</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        EJS_player = '#game';
        EJS_gameUrl = urlParams.get('rom');
        EJS_core = urlParams.get('core') || 'snes';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_virtualGamepad = false; // A parte mais importante: mata o controle nativo
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script>
        // Lógica de botões blindada
        document.querySelectorAll('button[data-key]').forEach(btn => {
            ['touchstart', 'mousedown'].forEach(evt => btn.addEventListener(evt, (e) => {
                e.preventDefault();
                btn.classList.add('pressed');
                document.dispatchEvent(new KeyboardEvent('keydown', {key: btn.dataset.key, code: btn.dataset.code}));
            }));
            ['touchend', 'mouseup', 'mouseleave'].forEach(evt => btn.addEventListener(evt, (e) => {
                btn.classList.remove('pressed');
                document.dispatchEvent(new KeyboardEvent('keyup', {key: btn.dataset.key, code: btn.dataset.code}));
            }));
        });

        document.getElementById('btn-save').onclick = () => { EJS_emulator.gameManager.quickSave(); alert('Salvo!'); };
        document.getElementById('btn-load').onclick = () => { EJS_emulator.gameManager.quickLoad(); alert('Carregado!'); };
    </script>
</body>
</html>
