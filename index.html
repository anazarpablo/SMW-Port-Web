<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game - Web Port</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="game-body">

    <div id="toast" class="hidden">Progresso Salvo!</div>

    <div id="game-wrapper">
        <div id="watermark">Alcino9d2026Anazar</div>
        
        <div id="game"></div>

        <div class="quick-menu">
            <button class="btn-quick" ontouchstart="salvarJogo(event)">💾 Save</button>
            <button class="btn-quick" ontouchstart="carregarJogo(event)">📂 Load</button>
        </div>
    </div>

    <!-- CONTROLES VIRTUAIS CORRIGIDOS -->
    <div id="mobile-controls">
        <div class="l-r-buttons">
            <button class="btn-trigger" ontouchstart="pressKey(event, 'q')" ontouchend="releaseKey(event, 'q')">L</button>
            <button class="btn-trigger" ontouchstart="pressKey(event, 'w')" ontouchend="releaseKey(event, 'w')">R</button>
        </div>

        <div class="dpad">
            <button class="btn-dpad up" ontouchstart="pressKey(event, 'ArrowUp')" ontouchend="releaseKey(event, 'ArrowUp')"></button>
            <button class="btn-dpad down" ontouchstart="pressKey(event, 'ArrowDown')" ontouchend="releaseKey(event, 'ArrowDown')"></button>
            <button class="btn-dpad left" ontouchstart="pressKey(event, 'ArrowLeft')" ontouchend="releaseKey(event, 'ArrowLeft')"></button>
            <button class="btn-dpad right" ontouchstart="pressKey(event, 'ArrowRight')" ontouchend="releaseKey(event, 'ArrowRight')"></button>
            <div class="dpad-center"></div>
        </div>

        <div class="menu-buttons">
            <button class="btn-menu" ontouchstart="pressKey(event, 'Shift')" ontouchend="releaseKey(event, 'Shift')">SELECT</button>
            <button class="btn-menu" ontouchstart="pressKey(event, 'Enter')" ontouchend="releaseKey(event, 'Enter')">START</button>
        </div>

        <div class="action-buttons">
            <button class="btn-action b-x" ontouchstart="pressKey(event, 's')" ontouchend="releaseKey(event, 's')">X</button>
            <button class="btn-action b-a" ontouchstart="pressKey(event, 'x')" ontouchend="releaseKey(event, 'x')">A</button>
            <button class="btn-action b-y" ontouchstart="pressKey(event, 'a')" ontouchend="releaseKey(event, 'a')">Y</button>
            <button class="btn-action b-b" ontouchstart="pressKey(event, 'z')" ontouchend="releaseKey(event, 'z')">B</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const romInUrl = urlParams.get('rom');
        const coreInUrl = urlParams.get('core') || 'snes';

        if (!romInUrl) {
            window.location.href = 'index.html';
        }

        EJS_player = '#game';
        EJS_gameUrl = romInUrl; 
        EJS_core = coreInUrl;
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_defaultVolume = 0.5;
        EJS_Background = "#050505"; 
        EJS_virtualGamepad = false; 
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script>
        // Sistema de Controle com bloqueio nativo
        function pressKey(e, key) {
            if(e) e.preventDefault(); // Impede o navegador de tentar rolar a tela
            window.dispatchEvent(new KeyboardEvent('keydown', { key: key }));
        }
        function releaseKey(e, key) {
            if(e) e.preventDefault();
            window.dispatchEvent(new KeyboardEvent('keyup', { key: key }));
        }

        // Sistema de Save
        function salvarJogo(e) {
            if(e) e.preventDefault();
            if(window.EJS_emulator && window.EJS_emulator.gameManager) {
                window.EJS_emulator.gameManager.quickSave();
                mostrarToast("💾 Jogo Salvo!");
            }
        }

        function carregarJogo(e) {
            if(e) e.preventDefault();
            if(window.EJS_emulator && window.EJS_emulator.gameManager) {
                window.EJS_emulator.gameManager.quickLoad();
                mostrarToast("📂 Jogo Carregado!");
            }
        }

        function mostrarToast(mensagem) {
            const toast = document.getElementById("toast");
            toast.innerText = mensagem;
            toast.classList.remove("hidden");
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
                toast.classList.add("hidden");
            }, 3000);
        }

        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
